---
- name: Configure timezone
  community.general.timezone:
    name: "{{ timezone }}"
  when: common_manage_timezone

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: common_manage_packages

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
  when: common_manage_packages

- name: Create systemd-networkd-wait-online override directory
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-networkd-wait-online.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: common_manage_networkd_wait_online

- name: Limit networkd-wait-online to primary interface
  ansible.builtin.copy:
    dest: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --interface={{ networkd_wait_online_interface }}
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: common_manage_networkd_wait_online

- name: Ensure model and data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ model_directories }}"
  when: common_manage_model_directories
