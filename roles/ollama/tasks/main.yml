---
- name: Ensure zstd is installed
  ansible.builtin.apt:
    name: zstd
    state: present
    update_cache: false
  become: true
  tags:
    - ollama

- name: Get currently installed Ollama version
  ansible.builtin.command: "{{ ollama_install_path }} --version"
  register: ollama_installed_version
  changed_when: false
  failed_when: false
  tags:
    - ollama

- name: Download Ollama archive from GitHub Releases
  ansible.builtin.get_url:
    url: "https://github.com/ollama/ollama/releases/download/v{{ ollama_version }}/ollama-linux-amd64.tar.zst"
    dest: "/tmp/ollama-linux-amd64-{{ ollama_version }}.tar.zst"
    mode: "0644"
  become: true
  when: >
    ollama_installed_version.rc != 0 or
    ollama_version not in ollama_installed_version.stdout
  tags:
    - ollama

- name: Extract Ollama archive to /usr/local
  ansible.builtin.unarchive:
    src: "/tmp/ollama-linux-amd64-{{ ollama_version }}.tar.zst"
    dest: /usr/local
    remote_src: true
    extra_opts:
      - --zstd
  become: true
  when: >
    ollama_installed_version.rc != 0 or
    ollama_version not in ollama_installed_version.stdout
  notify: restart ollama
  tags:
    - ollama

- name: Create ollama system group
  ansible.builtin.group:
    name: ollama
    system: true
    state: present
  become: true
  tags:
    - ollama

- name: Create ollama system user
  ansible.builtin.user:
    name: ollama
    group: ollama
    system: true
    shell: /usr/sbin/nologin
    home: /usr/share/ollama
    create_home: false
    state: present
  become: true
  tags:
    - ollama

- name: Create ollama home directory
  ansible.builtin.file:
    path: /usr/share/ollama
    state: directory
    owner: ollama
    group: ollama
    mode: "0750"
  become: true
  tags:
    - ollama

- name: Create Ollama models directory
  ansible.builtin.file:
    path: "{{ ollama_models_dir }}"
    state: directory
    owner: ollama
    group: ollama
    mode: "0755"
  become: true
  tags:
    - ollama

- name: Create ollama systemd unit file
  ansible.builtin.copy:
    dest: /etc/systemd/system/ollama.service
    mode: "0644"
    content: |
      [Unit]
      Description=Ollama Service
      After=network-online.target

      [Service]
      ExecStart={{ ollama_install_path }} serve
      User=ollama
      Group=ollama
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=default.target
  become: true
  notify:
    - daemon-reload
    - restart ollama
  tags:
    - ollama

- name: Create systemd override directory for Ollama
  ansible.builtin.file:
    path: "{{ ollama_override_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - ollama

- name: Deploy systemd override for Ollama environment
  ansible.builtin.template:
    src: override.conf.j2
    dest: "{{ ollama_override_dir }}/override.conf"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - daemon-reload
    - restart ollama
  tags:
    - ollama

- name: Enable and start Ollama service
  ansible.builtin.systemd:
    name: "{{ ollama_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags:
    - ollama
