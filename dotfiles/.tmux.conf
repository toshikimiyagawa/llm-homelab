# ==============================================================================
# General
# ==============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -s extended-keys always
set -as terminal-features '*:extkeys'
set -g history-limit 50000
set -g escape-time 10          # faster key sequence recognition (vim friendly)
set -g focus-events on
set -g mouse on                # mouse support: scroll, click pane/window
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # re-number after closing a window

# ==============================================================================
# Prefix key: Ctrl-s
# ==============================================================================
unbind C-b
set -g prefix C-s
bind C-s next-window

# ==============================================================================
# Key bindings
# ==============================================================================
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation: vim-style hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows
bind -r C-h previous-window
bind -r C-l next-window

# ==============================================================================
# Copy mode (vi keybindings)
# ==============================================================================
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ==============================================================================
# Plugins (TPM) — auto-installed by .devcontainer postCreateCommand
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin theme — Nerd Font icons + powerline separators
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# ==============================================================================
# Status bar
# ==============================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom

# Initialize TPM — must come BEFORE the status-left / status-right composition
# below, since those reference catppuccin variables defined by the plugin.
run '~/.tmux/plugins/tpm/tpm'

# Status line composition (runs after catppuccin is sourced)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_user}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# ==============================================================================
# Miscellaneous
# ==============================================================================
set -g display-panes-time 2000    # pane numbers display duration (ms)
set -g display-time 2000          # status message display duration (ms)
setw -g aggressive-resize off
