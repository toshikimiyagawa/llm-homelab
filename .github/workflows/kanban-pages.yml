# Publish the SDD kanban (.sdd/tasks.json) to GitHub Pages.
# Copy to .github/workflows/. Enable Pages first: Settings → Pages → Source: "GitHub Actions".
# Adjust `vendor/ai-sdd-guide` below if the submodule is placed elsewhere.
name: Kanban Pages
on:
  push:
    branches: [main]
    paths:
      - '.sdd/tasks.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Generate kanban HTML
        run: |
          mkdir -p _site
          if [ ! -f .sdd/tasks.json ]; then
            echo "No .sdd/tasks.json — publishing a placeholder page."
            echo '<!doctype html><meta charset="utf-8"><title>SDD Kanban</title><p>No .sdd/tasks.json found.</p>' > _site/index.html
          else
            bash vendor/ai-sdd-guide/orchestration/tools/kanban-html.sh .sdd/tasks.json _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
